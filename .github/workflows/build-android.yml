push:
 branches: ["main"]
 pull_request:

jobs:
 build-android:
 runs-on: ubuntu-latest steps:
 - uses: actions/checkout@v4 - name: Set up JDK uses: actions/setup-java@v4 with:
 distribution: temurin java-version: "17"

 - name: Set up Node uses: actions/setup-node@v4 with:
 node-version: "20"
 cache: "pnpm"

 - name: Set up pnpm uses: pnpm/action-setup@v4 with:
 version: "10"

 - name: Install dependencies run: pnpm install --frozen-lockfile - name: Build web & sync android run: pnpm mobile:sync:android - name: Build APK (debug)
 run: |
 cd android ./gradlew assembleDebug - name: Upload APK artifact uses: actions/upload-artifact@v4 with:
 name: chatbox-android-apk path: android/app/build/outputs/apk/debug/*.apk```
