name: Build Chatbox (Android)

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      release:
        description: "在本次运行结束后创建 GitHub Release（仅在 tag 推送时有效）"
        required: false
        default: "false"

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      # --------------------------------------------------------------
      # 1️⃣ 检出代码
      # --------------------------------------------------------------
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 让后面的 tag 操作可用

      # --------------------------------------------------------------
      # 2️⃣ 安装 Node.js（自动带 corepack）并激活 pnpm
      # --------------------------------------------------------------
      - name: 安装 Node.js 20 并激活 pnpm (corepack)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'           # 只缓存 node_modules，pnpm 本身不受影响
      - name: Activate pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate   # 需要的 pnpm 版本（9.x）
          pnpm --version                        # 检查是否成功

      # --------------------------------------------------------------
      # 3️⃣ 缓存 pnpm store（加速后续安装）
      # --------------------------------------------------------------
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # --------------------------------------------------------------
      # 4️⃣ 安装项目依赖
      # --------------------------------------------------------------
      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      # --------------------------------------------------------------
      # 5️⃣ JDK 21 + Gradle 缓存
      # --------------------------------------------------------------
      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # --------------------------------------------------------------
      # 6️⃣ Android SDK（官方 action，自动加入 PATH）
      # --------------------------------------------------------------
      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: 26.1.10909125
          cache: true

      # --------------------------------------------------------------
      # 7️⃣ 生成 Capacitor 资源、构建 Web
      # --------------------------------------------------------------
      - name: 生成 Capacitor 资源（图标、Splash 等）
        run: pnpm run mobile:assets

      - name: 构建 Web（Android 环境）
        run: pnpm exec electron-vite build
        env:
          CHATBOX_BUILD_TARGET: mobile_app
          CHATBOX_BUILD_PLATFORM: android

      # --------------------------------------------------------------
      # 8️⃣ 自动检测 Web 输出目录
      # --------------------------------------------------------------
      - name: 探测 Web 输出目录
        id: detect-webdir
        run: |
          set -e
          CANDIDATES=(
            "release/app/dist/renderer"
            "dist"
            "build"
            "out"
            "www"
            "release/app/dist"
            "app/dist"
          )
          for d in "${CANDIDATES[@]}"; do
            if [ -f "$d/index.html" ]; then
              echo "✅ 找到 index.html → $d"
              echo "WEB_DIR=$d" >> $GITHUB_OUTPUT
              exit 0
            fi
          done
          echo "❌ 未找到 index.html" >&2
          exit 1

      # --------------------------------------------------------------
      # 9️⃣ 生成 capacitor.config.json 并保存为 artifact（调试用）
      # --------------------------------------------------------------
      - name: 生成 capacitor.config.json
        run: |
          WEB_DIR="${{ steps.detect-webdir.outputs.WEB_DIR }}"
          cat > capacitor.config.json <<EOF
          {
            "appId": "xyz.chatboxapp.ce",
            "appName": "Chatbox",
            "webDir": "${WEB_DIR}",
            "bundledWebRuntime": false
          }
          EOF
          echo "✅ capacitor.config.json 已生成（webDir=${WEB_DIR})"
      - name: 保存 Capacitor 配置
        uses: actions/upload-artifact@v4
        with:
          name: capacitor-config
          path: capacitor.config.json
          retention-days: 30

      # --------------------------------------------------------------
      # 10️⃣ 添加 Android 平台、同步
      # --------------------------------------------------------------
      - name: 添加 Android 平台
        run: npx cap add android

      - name: 同步 Capacitor 到 Android
        run: npx cap sync android

      # --------------------------------------------------------------
      # 11️⃣ Gradle 缓存（加速 APK 编译）
      # --------------------------------------------------------------
      - name: Gradle 缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/build.gradle*', 'android/**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # --------------------------------------------------------------
      # 12️⃣ 构建 Release APK
      # --------------------------------------------------------------
      - name: 构建 Android APK (Release)
        working-directory: android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      # --------------------------------------------------------------
      # 13️⃣ 上传 APK（Artifact）
      # --------------------------------------------------------------
      - name: 上传 Android APK
        uses: actions/upload-artifact@v4
        with:
          name: chatbox-android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

  # -----------------------------------------------------------------
  # 可选：Tag 推送后自动创建 GitHub Release 并附带 APK
  # -----------------------------------------------------------------
  release-on-tag:
    needs: build-android
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/') &&
      (github.event.inputs.release == 'true' || github.event.inputs.release == '')
    permissions:
      contents: write
    steps:
      - name: 下载 APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: chatbox-android-apk
          path: ./apk

      - name: 创建（或更新）GitHub Release 并上传 APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "Chatbox Android $TAG" \
            --notes "自动构建的 Android Release APK（基于 commit $(git rev-parse --short HEAD)）" \
            ./apk/*.apk \
            || gh release upload "$TAG" ./apk/*.apk --clobber
