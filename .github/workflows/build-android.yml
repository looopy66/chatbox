name: Build Chatbox (Android)

# --------------------------------------------------------------
# 触发方式
# --------------------------------------------------------------
on:
  push:
    branches: [ main, master, develop ]   # 代码推送到这些分支时自动跑
  workflow_dispatch:                     # 手动触发
    inputs:
      release:
        description: "是否在本次运行结束后创建 GitHub Release（仅在 tag 推送时生效）"
        required: false
        default: "false"

# --------------------------------------------------------------
# 主作业：构建 Android APK
# --------------------------------------------------------------
jobs:
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read          # checkout
      packages: read          # pnpm registry (如使用私有 registry)
      id-token: write        # 用于 gh CLI 创建 Release（可选）

    steps:
      # ---------- 检出源码 ----------
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 为后续获取 tag 信息做准备

      # ---------- Node + pnpm ----------
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'   # 自动缓存 node_modules

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9   # 如需其他版本请自行修改

      # ---------- pnpm 缓存 ----------
      - name: 获取 pnpm 缓存目录
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ---------- 安装项目依赖 ----------
      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      # ---------- JDK ----------
      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'   # Gradle 缓存（加速后续编译）

      # ---------- Android SDK ----------
      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34          # 目前最新的 API
          ndk-version: 26.1.10909125   # 如有需要可自行修改
          cache: true

      # ---------- 生成 Capacitor 资源 ----------
      - name: 生成 Capacitor 资源（图标等）
        run: pnpm run mobile:assets

      # ---------- 构建 Web（Electron‑Vite） ----------
      - name: 构建 Web 部分（Android 环境）
        run: pnpm exec electron-vite build
        env:
          CHATBOX_BUILD_TARGET: mobile_app
          CHATBOX_BUILD_PLATFORM: android

      # ---------- 探测 Web 输出目录 ----------
      - name: 探测 Web 构建输出目录
        id: detect-webdir
        run: |
          set -e
          POSSIBLE_DIRS=(
            "release/app/dist/renderer"
            "dist"
            "build"
            "out"
            "www"
            "release/app/dist"
            "app/dist"
          )
          for dir in "${POSSIBLE_DIRS[@]}"; do
            if [ -f "$dir/index.html" ]; then
              echo "✅ 找到 index.html 在: $dir"
              echo "WEB_DIR=$dir" >> $GITHUB_OUTPUT
              exit 0
            fi
          done
          echo "❌ 错误：无法找到包含 index.html 的输出目录" >&2
          exit 1

      # ---------- 生成 Capacitor 配置 ----------
      - name: 生成 Capacitor 配置文件
        run: |
          WEB_DIR="${{ steps.detect-webdir.outputs.WEB_DIR }}"
          cat > capacitor.config.json <<EOF
          {
            "appId": "xyz.chatboxapp.ce",
            "appName": "Chatbox",
            "webDir": "${WEB_DIR}",
            "bundledWebRuntime": false
          }
          EOF
          echo "✅ 已生成 capacitor.config.json，webDir = ${WEB_DIR}"
        # 把生成的文件保存为 artifact，方便后续检查
      - name: 保存 Capacitor 配置为 artifact
        uses: actions/upload-artifact@v4
        with:
          name: capacitor-config
          path: capacitor.config.json
          retention-days: 30

      # ---------- 添加 Android 平台 ----------
      - name: 添加 Android 平台
        run: npx cap add android

      # ---------- 同步 Capacitor 配置 ----------
      - name: 同步 Capacitor 配置到 Android
        run: npx cap sync android

      # ---------- Gradle 缓存 ----------
      - name: Gradle 缓存准备
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/build.gradle*', 'android/**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---------- 构建 Android APK ----------
      - name: 构建 Android APK (Release)
        working-directory: android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}   # 确保 Gradle 使用 JDK21
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      # ---------- 上传 APK ----------
      - name: 上传 Android APK
        uses: actions/upload-artifact@v4
        with:
          name: chatbox-android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

# --------------------------------------------------------------
# 可选：在 Tag 推送且用户勾选 “release” 时创建 Release 并附加 APK
# --------------------------------------------------------------
  release-on-tag:
    name: 📦 Create Release (if tag)
    needs: build-android
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/') &&
      (github.event.inputs.release == 'true' || github.event.inputs.release == '')
    permissions:
      contents: write   # 创建 Release
    steps:
      - name: 下载 APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: chatbox-android-apk
          path: ./apk

      - name: 创建（或更新）GitHub Release 并上传 APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_NAME" \
            --title "Chatbox Android $TAG_NAME" \
            --notes "自动构建的 Android APK（Release 构建），基于 commit $(git rev-parse --short HEAD)." \
            ./apk/*.apk \
            || gh release upload "$TAG_NAME" ./apk/*.apk --clobber
