name: Build Chatbox (Android)

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      release:
        description: "在本次运行结束后创建 GitHub Release（仅在 tag 推送时有效）"
        required: false
        default: "false"

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write               # 为后面的 gh CLI（创建 Release）准备

    steps:
      # --------------------------------------------------------------
      # 1️⃣ 检出代码
      # --------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0            # 需要完整历史，以便后面获取 tag

      # --------------------------------------------------------------
      # 2️⃣ 安装 Node.js 20 并激活 pnpm (corepack)
      # --------------------------------------------------------------
      - name: Setup Node.js 20 + corepack
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'            # 只缓存 node_modules，pnpm 本身不受影响
      - name: Activate pnpm via corepack
        run: |
          corepack enable                               # 启动 corepack
          corepack prepare pnpm@9 --activate            # 选定 pnpm 9.x（最新的 9 系列）
          pnpm --version                               # 打印版本，确认可用

      # --------------------------------------------------------------
      # 3️⃣ 缓存 pnpm store（提升后续 install 速度）
      # --------------------------------------------------------------
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # --------------------------------------------------------------
      # 4️⃣ 安装项目依赖
      # --------------------------------------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --------------------------------------------------------------
      # 5️⃣ JDK 21 + Gradle 缓存
      # --------------------------------------------------------------
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # --------------------------------------------------------------
      # 6️⃣ Android SDK（官方 action，自动加入 PATH）
      # --------------------------------------------------------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: 26.1.10909125
          cache: true

      # --------------------------------------------------------------
      # 7️⃣ 生成 Capacitor 资源（图标、Splash 等）
      # --------------------------------------------------------------
      - name: Generate Capacitor assets
        run: pnpm run mobile:assets

      # --------------------------------------------------------------
      # 8️⃣ 构建 Web（Electron‑Vite） → 输出目录稍后自动检测
      # --------------------------------------------------------------
      - name: Build web (Android target)
        run: pnpm exec electron-vite build
        env:
          CHATBOX_BUILD_TARGET: mobile_app
          CHATBOX_BUILD_PLATFORM: android

      # --------------------------------------------------------------
      # 9️⃣ 自动检测 Web 输出目录
      # --------------------------------------------------------------
      - name: Detect web output directory
        id: detect-webdir
        run: |
          set -e
          CANDIDATES=(
            "release/app/dist/renderer"
            "dist"
            "build"
            "out"
            "www"
            "release/app/dist"
            "app/dist"
          )
          for d in "${CANDIDATES[@]}"; do
            if [ -f "$d/index.html" ]; then
              echo "✅ Found index.html → $d"
              echo "WEB_DIR=$d" >> $GITHUB_OUTPUT
              exit 0
            fi
          done
          echo "❌ index.html not found" >&2
          exit 1

      # --------------------------------------------------------------
      # 10️⃣ 生成 capacitor.config.json（并存 artifact 供调试）
      # --------------------------------------------------------------
      - name: Create capacitor.config.json
        run: |
          WEB_DIR="${{ steps.detect-webdir.outputs.WEB_DIR }}"
          cat > capacitor.config.json <<EOF
          {
            "appId": "xyz.chatboxapp.ce",
            "appName": "Chatbox",
            "webDir": "${WEB_DIR}",
            "bundledWebRuntime": false
          }
          EOF
          echo "✅ capacitor.config.json created (webDir=${WEB_DIR})"
      - name: Upload capacitor config (debug)
        uses: actions/upload-artifact@v4
        with:
          name: capacitor-config
          path: capacitor.config.json
          retention-days: 30

      # --------------------------------------------------------------
      # 11️⃣ 添加 Android 平台并同步
      # --------------------------------------------------------------
      - name: Add Android platform
        run: npx cap add android
      - name: Sync Capacitor to Android
        run: npx cap sync android

      # --------------------------------------------------------------
      # 12️⃣ Gradle 缓存（加速 APK 编译）
      # --------------------------------------------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/build.gradle*', 'android/**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # --------------------------------------------------------------
      # 13️⃣ 构建 Release APK
      # --------------------------------------------------------------
      - name: Build Android APK (Release)
        working-directory: android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      # --------------------------------------------------------------
      # 14️⃣ 上传 APK 产物（Artifact）
      # --------------------------------------------------------------
      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatbox-android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

  # -----------------------------------------------------------------
  # 可选：Tag 推送后自动创建 Release 并附带 APK
  # -----------------------------------------------------------------
  release-on-tag:
    needs: build-android
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/') &&
      (github.event.inputs.release == 'true' || github.event.inputs.release == '')
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: chatbox-android-apk
          path: ./apk

      - name: Create GitHub Release + upload APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "Chatbox Android $TAG" \
            --notes "自动构建的 Android Release APK（基于 commit $(git rev-parse --short HEAD)）" \
            ./apk/*.apk \
            || gh release upload "$TAG" ./apk/*.apk --clobber
